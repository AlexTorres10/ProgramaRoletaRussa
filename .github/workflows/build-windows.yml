name: Build Windows EXE + Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==5.13.2

      - name: Convert icon PNG to ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('img/rr_icon.png').convert('RGBA')
          img.save('img/rr_icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "

      - name: Build with PyInstaller
        run: pyinstaller main.spec

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer
        run: makensis installer.nsi

      - name: Upload standalone folder
        uses: actions/upload-artifact@v3
        with:
          name: RoletaRussa-portable
          path: dist/RoletaRussa/

      - name: Upload installer EXE
        uses: actions/upload-artifact@v3
        with:
          name: RoletaRussa-Setup
          path: RoletaRussa-Setup.exe
